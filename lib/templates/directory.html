<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>{{title}}</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="{markserv}templates/markserv.css" />
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({ 
        startOnLoad: true,
        theme: 'base',
        themeVariables: {
          fontFamily: '"Helvetica Neue", Helvetica, "Segoe UI", Arial, freesans, sans-serif',
          primaryColor: '#373B41',
          primaryTextColor: '#E6E6E6',
          primaryBorderColor: '#676B79',
          lineColor: '#6FC1FF',
          secondaryColor: '#3E4250',
          tertiaryColor: '#242526',
          mainBkg: '#292A2B',
          nodeBorder: '#676B79',
          clusterBkg: '#373B41',
          clusterBorder: '#676B79',
          defaultLinkColor: '#6FC1FF',
          titleColor: '#E6E6E6',
          edgeLabelBackground: '#373B41'
        },
        flowchart: {
          curve: 'basis'
        }
      });
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/panda-syntax-dark.min.css"
    />
    <link rel="stylesheet" href="{markserv}icons/icons.css" />
  </head>
  <body class="dir">
    <div class="layout-container">
      {{#if hasNavTree}}
        <aside class="sidebar" id="sidebar">{{{navTree}}}</aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
      {{/if}}
      <article class="markdown-body">
        {{#if hasNavTree}}
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Menu">☰</button>
        {{/if}}
        <h1 class="icon folder">
          {{#each breadcrumbs}}<a href="{{href}}">{{text}}</a>{{/each}}
        </h1>
        {{{content}}}
        <footer>
          <sup
            ><hr />
            Served by
            <a href="https://www.npmjs.com/package/markserv">MarkServ</a> | PID:
            {{pid}}</sup
          >
        </footer>
      </article>
    </div>
    {{#if hasNavTree}}
    <script>
      const menuToggle = document.getElementById('menu-toggle');
      const sidebar = document.getElementById('sidebar');
      const sidebarOverlay = document.getElementById('sidebar-overlay');
      
      if (menuToggle && sidebar && sidebarOverlay) {
        const toggleMenu = () => {
          sidebar.classList.toggle('open');
          sidebarOverlay.classList.toggle('open');
        };
        menuToggle.addEventListener('click', toggleMenu);
        sidebarOverlay.addEventListener('click', toggleMenu);
        // Close sidebar when clicking a link inside it on mobile
        sidebar.addEventListener('click', (e) => {
          if (e.target.tagName === 'A' && window.innerWidth <= 768) {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
          }
        });
      }
    </script>
    {{/if}}
  </body>
</html>
